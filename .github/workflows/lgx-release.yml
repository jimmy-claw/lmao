name: LGX Release

on:
  push:
    branches: [master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [master, main]

jobs:
  build-lgx:
    name: Build LGX Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Try nix build
        id: nix-build
        continue-on-error: true
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build with nix
        id: nix-pkg
        if: steps.nix-build.outcome == 'success'
        continue-on-error: true
        run: nix build .#lib --extra-experimental-features "nix-command flakes"

      - name: Fallback to script packaging
        if: steps.nix-pkg.outcome != 'success'
        run: |
          cargo build --release -p waku-a2a-ffi
          bash scripts/package-lgx.sh

      - name: Upload LGX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lgx-package
          path: dist/lmao-*.lgx
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build-lgx
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lgx-package
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LMAO ${{ github.ref_name }}"
          body: "Logos Messaging Agent Orchestration — IComponent module package"
          files: dist/lmao-*.lgx
